<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>LifeEar 理想の暮らし体験版</title>
    <style>
      :root{
        --bg:#eef6ff;
        --bg2:#f8fbff;
        --card:#ffffff;
        --line:#d9e7f4;
        --text:#0f172a;
        --muted:#64748b;
        --blue:#2563eb;
        --soft:#edf4ff;
      }
      *{box-sizing:border-box}
      html,body{margin:0}
      body{
        min-height:100vh;
        display:grid;
        place-items:center;
        background:
          radial-gradient(circle at top left, rgba(56,189,248,.16), transparent 24%),
          linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
        color:var(--text);
        font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;
      }
      button,input,select,textarea{font:inherit}
      .app{
        width:min(430px,100vw);
        min-height:100dvh;
        display:grid;
        grid-template-rows:auto 1fr auto;
        background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
        overflow:hidden;
      }
      .top{
        display:grid;
        grid-template-columns:42px 1fr 86px;
        gap:10px;
        align-items:center;
        padding:14px;
        border-bottom:1px solid var(--line);
        background:rgba(255,255,255,.92);
        backdrop-filter:blur(10px);
      }
      .top small{
        display:block;
        color:var(--muted);
        letter-spacing:.08em;
        text-transform:uppercase;
      }
      .top strong{display:block;margin-top:2px}
      .icon,.ghost,.primary,.secondary,.tab,.choice{
        border:none;
        border-radius:18px;
        cursor:pointer;
        transition:
          transform .16s ease,
          box-shadow .18s ease,
          background .18s ease,
          border-color .18s ease;
      }
      .icon,.ghost{
        min-height:40px;
        background:var(--soft);
        color:var(--text);
        font-weight:800;
      }
      .ghost{font-size:13px}
      .hidden{visibility:hidden}
      .body{padding:12px 12px 18px;overflow:hidden}
      .screen{display:none;gap:12px;height:100%;align-content:start;min-height:0}
      .screen.active{display:grid;animation:screen-in .22s ease}
      .screen.scrollable.active{overflow:auto;padding-right:2px}
      @keyframes screen-in{
        from{opacity:0;transform:translateX(18px)}
        to{opacity:1;transform:none}
      }
      .card{
        padding:14px;
        border:1px solid var(--line);
        border-radius:22px;
        background:var(--card);
        box-shadow:0 16px 34px rgba(15,23,42,.06);
      }
      .hero{
        padding:18px 16px;
        background:
          radial-gradient(circle at top right, rgba(56,189,248,.12), transparent 32%),
          linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
      }
      .pill{
        display:inline-flex;
        align-items:center;
        min-height:28px;
        padding:0 12px;
        border-radius:999px;
        font-size:12px;
        font-weight:800;
        background:#e8f3ff;
        color:#2563eb;
      }
      h1,h2,h3,p{margin:0}
      h1{margin-top:12px;font-size:34px;line-height:1.04;letter-spacing:-.06em}
      h2{font-size:22px;letter-spacing:-.04em}
      .small,.muted{color:var(--muted);line-height:1.6}
      .small{font-size:12px}
      .stack,.list,.timeline,.actions,.steps,.grid2,.reply-grid{display:grid;gap:12px}
      .list{min-height:0}
      .primary,.secondary{
        width:100%;
        min-height:52px;
        padding:0 16px;
        font-weight:800;
      }
      .primary{
        background:linear-gradient(135deg,#0ea5e9,var(--blue));
        color:#fff;
        box-shadow:0 14px 28px rgba(37,99,235,.24);
      }
      .secondary{background:var(--soft);color:var(--text)}
      .step,.item,.timeline-item,.fieldbox{
        padding:12px;
        border-radius:16px;
        border:1px solid #e2e8f0;
        background:#fbfdff;
      }
      .choice{
        padding:13px 14px;
        border:1px solid var(--line);
        background:#ffffff;
        text-align:left;
        box-shadow:0 10px 24px rgba(15,23,42,.04);
      }
      .choice.active{
        transform:translateY(-2px);
        border-color:rgba(37,99,235,.28);
        background:#f3f8ff;
        box-shadow:0 18px 30px rgba(37,99,235,.10);
      }
      .choice strong,.item strong,.timeline-item strong,.step strong{
        display:block;
        margin:4px 0 3px;
      }
      .ai-note{
        display:grid;
        grid-template-columns:auto 1fr;
        gap:10px;
        align-items:start;
      }
      .ai-voice{
        width:38px;
        height:38px;
        border-radius:14px;
        display:grid;
        place-items:center;
        font-size:18px;
        background:#e8f3ff;
      }
      .ai-bubble{
        padding:14px 15px;
        border-radius:20px 20px 20px 8px;
        background:#f3f8ff;
        border:1px solid #d9e7f4;
      }
      .ai-bubble strong{
        display:block;
        margin-bottom:4px;
      }
      .micro{
        font-size:12px;
        color:var(--muted);
      }
      .reply-grid{
        grid-template-columns:1fr;
      }
      .choice .micro{
        margin-top:6px;
      }
      .choice.compact .small{line-height:1.45}
      .item-calendar-btn{
        min-height:42px;
        font-size:13px;
      }
      .compact-stack{display:grid;gap:10px;min-height:0}
      .scroll-panel{min-height:0;overflow:auto;padding-right:2px}
      .route-tabs{
        display:grid;
        grid-template-columns:repeat(5,1fr);
        gap:8px;
      }
      .route-chip{
        min-height:38px;
        padding:0 8px;
        border-radius:14px;
        border:1px solid var(--line);
        background:#ffffff;
        color:var(--muted);
        font-weight:800;
      }
      .route-chip.active{
        background:linear-gradient(135deg,#0ea5e9,var(--blue));
        color:#fff;
        border-color:transparent;
      }
      .catalog-card{
        display:grid;
        gap:4px;
      }
      .catalog-card .row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:8px;
      }
      .text-link{
        width:auto;
        min-height:auto;
        padding:0;
        border:none;
        background:transparent;
        color:var(--blue);
        font-size:12px;
        font-weight:800;
        text-align:left;
        text-decoration:underline;
        text-underline-offset:3px;
        box-shadow:none;
      }
      .text-link:active{transform:scale(.99)}
      .time{
        display:inline-flex;
        margin-bottom:6px;
        color:#2563eb;
        font-size:12px;
        font-weight:800;
      }
      label{display:grid;gap:6px;font-weight:700}
      input,select,textarea{
        width:100%;
        min-height:46px;
        padding:10px 12px;
        border-radius:14px;
        border:1px solid #dbe7f3;
        background:#f8fbff;
        color:var(--text);
      }
      textarea{min-height:88px;resize:vertical}
      .tabs{
        display:none;
        grid-template-columns:repeat(3,1fr);
        gap:10px;
        padding:12px 14px calc(12px + env(safe-area-inset-bottom));
        border-top:1px solid var(--line);
        background:rgba(255,255,255,.96);
      }
      .tabs.show{display:grid}
      .tab{
        min-height:52px;
        background:var(--soft);
        color:var(--muted);
        font-weight:800;
      }
      .tab.active{
        background:linear-gradient(135deg,#0ea5e9,var(--blue));
        color:#fff;
      }
      .empty{
        padding:14px;
        border:1px dashed #d4e4f2;
        border-radius:18px;
        color:var(--muted);
        line-height:1.8;
        background:#fcfdff;
      }
      .choice:active,.icon:active,.ghost:active,.primary:active,
      .secondary:active,.tab:active{transform:scale(.98)}
      .flash{animation:flash .32s ease}
      @keyframes flash{
        0%{transform:scale(.98);filter:brightness(.98)}
        55%{transform:scale(1.015);filter:brightness(1.04)}
        100%{transform:none;filter:none}
      }
      .toast{
        position:fixed;
        left:50%;
        top:18px;
        transform:translateX(-50%) translateY(-18px) scale(.98);
        width:min(390px,calc(100vw - 28px));
        padding:16px 18px;
        border-radius:22px;
        border:1px solid var(--line);
        background:rgba(255,255,255,.98);
        color:var(--text);
        box-shadow:0 22px 50px rgba(15,23,42,.18);
        opacity:0;
        pointer-events:none;
        transition:opacity .22s ease, transform .22s ease;
        z-index:30;
        text-align:center;
        font-weight:800;
      }
      .toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
      @media (min-width:520px){
        .app{
          min-height:min(920px,calc(100vh - 20px));
          border-radius:34px;
          border:1px solid rgba(148,163,184,.16);
        }
        .grid2,.reply-grid{grid-template-columns:repeat(2,1fr)}
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="top">
        <button class="icon hidden" id="backBtn">戻る</button>
        <div>
          <small id="topSub">LifeEar</small>
          <strong id="topTitle">理想の暮らし</strong>
        </div>
        <button class="ghost hidden" id="topAction">暮らし変更</button>
      </header>

      <main class="body" id="body">
        <section class="screen active" id="welcome">
          <article class="card hero">
            <span class="pill">理想の暮らし体験版</span>
            <h1>理想の暮らしを、今日の1日に落とし込む。</h1>
            <div class="ai-note" style="margin-top:16px">
              <div class="ai-voice">AI</div>
              <div class="ai-bubble">
                <strong>おはようございます。</strong>
                <div class="small">今日はどんな1日にしたいですか？一緒に整えます。</div>
              </div>
            </div>
            <div class="actions" style="margin-top:18px">
              <button class="primary" id="startBtn">理想の暮らしを見つける</button>
            </div>
          </article>
        </section>

        <section class="screen" id="choose">
          <article class="card">
            <div class="ai-note">
              <div class="ai-voice">AI</div>
              <div class="ai-bubble">
                <strong>今日は何をいちばん整えたいですか？</strong>
                <div class="small">近いものを押してください。そこから今日の流れを作ります。</div>
              </div>
            </div>
          </article>
          <div class="list" id="choices"></div>
        </section>

        <section class="screen" id="detail"></section>

        <section class="screen" id="route"></section>

        <section class="screen" id="catalog"></section>

        <section class="screen" id="today">
          <article class="card">
            <div class="ai-note">
              <div class="ai-voice">AI</div>
              <div class="ai-bubble">
                <strong>わかりました。今日の状態を少しだけ教えてください。</strong>
                <div class="small" id="todayLead"></div>
              </div>
            </div>
          </article>

          <article class="card">
            <div class="grid2">
              <label>
                昨夜の睡眠時間
                <select id="sleepInput"></select>
              </label>
              <label>
                今日どれくらい動けそう？
                <select id="energyInput">
                  <option value="low">あまり動けなさそう</option>
                  <option value="medium" selected>ふつうに動けそう</option>
                  <option value="high">けっこう動けそう</option>
                </select>
              </label>
            </div>
          </article>

          <div class="actions">
            <button class="primary" id="planBtn">今日の過ごし方を見る</button>
          </div>
        </section>

        <section class="screen" id="plan">
          <article class="card hero">
            <div class="ai-note">
              <div class="ai-voice">AI</div>
              <div class="ai-bubble">
                <strong id="planTitle"></strong>
                <div id="planSummary" class="small"></div>
              </div>
            </div>
          </article>

          <div class="list scroll-panel" id="planList"></div>

          <div class="actions">
            <button class="primary" id="calendarBtn">全部カレンダーに入れる</button>
            <button class="secondary" id="editPlanBtn">条件を変える</button>
          </div>
        </section>

        <section class="screen" id="home">
          <article class="card hero">
            <div class="ai-note">
              <div class="ai-voice">AI</div>
              <div class="ai-bubble">
                <strong id="homeTitle"></strong>
                <div id="homeSummary" class="small"></div>
              </div>
            </div>
            <div class="actions" style="margin-top:16px">
              <button class="primary" id="homeMainBtn">今日の過ごし方を作る</button>
              <button class="secondary" id="homeSubBtn">理想の暮らしを変える</button>
            </div>
          </article>
        </section>

        <section class="screen scrollable" id="reflect">
          <article class="card">
            <span class="pill">ふりかえり</span>
            <h2 style="margin-top:12px">今日はどんな暮らしに近づけましたか？</h2>
            <p class="small" style="margin-top:8px">
              大きなことじゃなくて大丈夫です。できたことを一言だけでも残しておくと、
              次が少しやりやすくなります。
            </p>
          </article>

          <article class="card">
            <label>
              今日のひとことタグ
              <select id="tagInput">
                <option value="仕事が進んだ">仕事が進んだ</option>
                <option value="体が整った">体が整った</option>
                <option value="お金を整えられた">お金を整えられた</option>
                <option value="少し休めた">少し休めた</option>
              </select>
            </label>
            <label style="margin-top:12px">
              ひとこと
              <textarea
                id="postInput"
                placeholder="今日できたことや、明日につなげたいことを書きます"
              ></textarea>
            </label>
            <div class="actions" style="margin-top:14px">
              <button class="primary" id="postBtn">ふりかえりを残す</button>
            </div>
          </article>

          <article class="card">
            <span class="pill">これまでのふりかえり</span>
            <div class="list" id="postList" style="margin-top:12px"></div>
          </article>
        </section>
      </main>

      <nav class="tabs" id="tabs">
        <button class="tab" data-screen="home">ホーム</button>
        <button class="tab" data-screen="today">今日</button>
        <button class="tab" data-screen="reflect">ふりかえり</button>
      </nav>

      <div class="toast" id="toast"></div>
    </div>

    <script src="lifeear-data.js"></script>
    <script src="lifeear-app.js"></script>
  </body>
</html>
